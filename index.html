<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Los Pollos Tech</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="box">

    <h1>🐔 Los Pollos Tech</h1>
    <p>Login / Registrazione</p>

    <div class="tabs">
        <button id="tabLogin" class="active">Login</button>
        <button id="tabRegister">Registrati</button>
    </div>

    <!-- LOGIN -->
    <form id="loginForm">
        <input id="loginUser" placeholder="Username" required>
        <input id="loginPass" type="password" placeholder="Password" required>
        <button>Accedi</button>
        <p id="loginMsg"></p>
    </form>

    <!-- REGISTER -->
    <form id="registerForm" style="display:none;">
        <input id="regUser" placeholder="Username" required>
        <input id="regPass" type="password" placeholder="Password" required>
        <input id="regCode" placeholder="Codice accesso" required>
        <button>Registrati</button>
        <p id="registerMsg"></p>
    </form>

</div>

<script src="script.js"></script>
</body>
</html>
