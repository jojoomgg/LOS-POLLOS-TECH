<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Los Pollos Tech</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>🐔 Los Pollos Tech</h1>
    <p class="subtitle">Accesso piattaforma</p>

    <div class="tabs">
        <button id="loginTab" class="active">Login</button>
        <button id="registerTab">Registrati</button>
    </div>

    <!-- LOGIN -->
    <form id="loginForm">
        <input type="text" id="loginUser" placeholder="Username" required>
        <input type="password" id="loginPass" placeholder="Password" required>

        <button type="submit">Accedi</button>
        <p id="loginMsg"></p>
    </form>

    <!-- REGISTER -->
    <form id="registerForm" style="display:none;">
        <input type="text" id="regUser" placeholder="Username" required>
        <input type="password" id="regPass" placeholder="Password" required>
        <input type="text" id="regCode" placeholder="Codice accesso" required>

        <button type="submit">Registrati</button>
        <p id="regMsg"></p>
    </form>

</div>

<script src="script.js"></script>
</body>
</html>
